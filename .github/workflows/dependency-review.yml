name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Dependency Review
        # This repo can't run dependency review (it requires GitHub Advanced
        # Security on private repos), so report but never block the PR.
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
